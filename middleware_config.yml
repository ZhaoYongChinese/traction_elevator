# ====== 全局配置 ======
log_level: "INFO"
ALERT_GAP: 30                 # 报警节流间隔（秒）

# 采样率配置（避免重复定义）
SAMPLING_RATE: 25600      # 原始数据采样率（如需要）
PROC_SAMPLING_RATE: 8000      # 处理用采样率（电机故障检测使用）

FAULT_WINDOW: 10              # 轴承故障窗口大小
PREDICT_WINDOW: 10            # 趋势预测窗口
FAULT_TRIGGER_COUNT: 3        # 轴承故障触发次数

# 轴承参数
bearing:
  n: 9
  d: 12.7
  D: 65.0
  beta: 0
  rpm: 1450

# 报警码对应描述
alert_name:
  "9001": "轴承故障"
  "9002": "螺栓松动"
  "9003": "钢丝绳伸长"
  "9004": "电机故障"

# 部件与报警码映射
escalator_component_name:
  "bearing": ["9001"]
  "bolt": ["9002"]
  "rope": ["9003"]
  "motor": ["9004"]

# ====== 故障检测器配置 ======
fault_detectors:
  # 轴承故障检测器
  bearing:
    type: "bearing"
    sensors: ["WXT01_p001_9001", "WXT02_p002_9001"]
    params:
      window_size: 10
      expand_ratio: 8
      trigger_count: 3

  # 螺栓松动检测器（改为基于RMS判断）
  bolt_loosen:
    type: "bolt_loosen"
    sensors:
      - name: "WXT01_p001_9002"
        rms_threshold: 0.35               # 该传感器独立RMS阈值 (g)
        consecutive_exceed_count: 3       # 连续超限次数阈值
      - name: "WXT01_p003_9002"
        # 未指定则使用 params 中的默认值
    params:
      window_size: 10                     # 历史窗口长度（保留，可能用于RMS平滑）
      trigger_count: 3                    # 报警节流（可替换为 alarm_cooldown）
      rms_threshold: 0.3                  # 默认RMS报警阈值 (g)
      consecutive_exceed_count: 5         # 默认连续超限次数
      alarm_cooldown: 30                  # 报警冷却时间（秒），建议与全局 ALERT_GAP 协调

  # 钢丝绳伸长检测器
  rope_fault:
    type: "rope"
    sensors:
      - name: "WXT02_p004_9003"
        baseline_rms: 0.12              # 健康基线 RMS（g），必填
        ratio_tension: 4.0              # 张力不均
        ratio_slip: 6.0                 # 打滑
        ratio_wear: 8.0                 # 磨损
        trigger_count: 3
      - name: "WXT03_p005_9004"
        baseline_rms: 0.15
        # 使用默认倍数
    params:
      ratio_tension: 4.0
      ratio_slip: 6.0
      ratio_wear: 8.0
      trigger_count: 3
      alarm_cooldown: 30

  # 电机故障检测器（支持传感器独立阈值）
  motor_fault:
    type: "motor"
    sensors:
      - name: "WXT02_p004_9003"
        custom_threshold: 3.1        # 该传感器的独立阈值倍数
      - name: "WXT03_p005_9004"
        custom_threshold: 2.8
    params:
      window_size: 10
      expand_ratio: 8                # 默认阈值倍数（当 custom_threshold 未设置时使用）
      trigger_count: 3
      # 电机诊断专用阈值
      ratio2_misalign: 0.6
      ratio3_misalign: 0.3
      ratio2_eccentric: 0.3
      ratio3_eccentric: 0.15
      sample_rate: 8000              # 处理采样率
  # 轿厢大类故障检测器
  elevator_car:
    type: "elevator_car"
    sensors:
      - name: "CAR_XT001_VIB"
        # 可为该传感器单独调整各轴阈值（可选）
        pf_thresh_X: 5.5
        pf_thresh_Y: 5.5
        pf_thresh_Z: 6.0
        trigger_count: 4
      - name: "CAR_XT002_VIB"
        # 使用默认值
    params:
      stability_pf_thresh: 5.0      # 默认X/Y/Z轴峰值因子阈值
      stability_if_thresh: 6.0      # 默认脉冲因子阈值
      stability_mf_thresh: 7.0      # 默认裕度因子阈值
      trigger_count: 3
      alarm_cooldown: 30